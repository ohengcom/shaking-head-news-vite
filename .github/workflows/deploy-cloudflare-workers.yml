name: Deploy Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-workers-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy (vinext -> Workers)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      BETTER_AUTH_URL: https://sn.oheng.com
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      AUTH_MICROSOFT_ENTRA_ID_ID: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_ID }}
      AUTH_MICROSOFT_ENTRA_ID_SECRET: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_SECRET }}
      AUTH_MICROSOFT_ENTRA_ID_TENANT_ID: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_TENANT_ID }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      NEWS_API_BASE_URL: ${{ secrets.NEWS_API_BASE_URL }}
      NEXT_PUBLIC_LOG_LEVEL: ${{ secrets.NEXT_PUBLIC_LOG_LEVEL }}
      NEXT_PUBLIC_ADSENSE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_ADSENSE_CLIENT_ID }}
      NEXT_PUBLIC_ADSENSE_SLOT_SIDEBAR: ${{ secrets.NEXT_PUBLIC_ADSENSE_SLOT_SIDEBAR }}
      NEXT_PUBLIC_ADSENSE_SLOT_HEADER: ${{ secrets.NEXT_PUBLIC_ADSENSE_SLOT_HEADER }}
      NEXT_PUBLIC_ADSENSE_SLOT_FOOTER: ${{ secrets.NEXT_PUBLIC_ADSENSE_SLOT_FOOTER }}
      NEXT_PUBLIC_ADSENSE_SLOT_INLINE: ${{ secrets.NEXT_PUBLIC_ADSENSE_SLOT_INLINE }}
      NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
      NEXT_PUBLIC_VERCEL_ANALYTICS: ${{ secrets.NEXT_PUBLIC_VERCEL_ANALYTICS }}
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm install --include=dev --include=optional
          npm install --no-save @rollup/rollup-linux-x64-gnu@4.56.0 @parcel/watcher-linux-x64-glibc@2.5.6 @next/swc-linux-x64-gnu@16.1.6

      - name: Validate required Cloudflare secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing secret: CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing secret: CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi
          if [ -z "$BETTER_AUTH_URL" ]; then
            echo "Missing secret: BETTER_AUTH_URL"
            exit 1
          fi
          if [ -z "$BETTER_AUTH_SECRET" ]; then
            echo "Missing secret: BETTER_AUTH_SECRET"
            exit 1
          fi

          if [ -z "$NEXT_PUBLIC_ADSENSE_CLIENT_ID" ]; then
            echo "Missing secret: NEXT_PUBLIC_ADSENSE_CLIENT_ID"
            exit 1
          fi

          if [ -z "$NEXT_PUBLIC_ADSENSE_SLOT_SIDEBAR" ] && \
             [ -z "$NEXT_PUBLIC_ADSENSE_SLOT_HEADER" ] && \
             [ -z "$NEXT_PUBLIC_ADSENSE_SLOT_FOOTER" ] && \
             [ -z "$NEXT_PUBLIC_ADSENSE_SLOT_INLINE" ]; then
            echo "Missing AdSense slot secrets: set at least one NEXT_PUBLIC_ADSENSE_SLOT_*"
            exit 1
          fi

      - name: Sync runtime auth secrets to Worker
        run: |
          put_secret_if_present () {
            local key="$1"
            local value="${!key:-}"

            if [ -z "$value" ]; then
              echo "Skip empty secret: $key"
              return 0
            fi

            printf '%s' "$value" | npx wrangler secret put "$key" --name shaking-head-news-vite
          }

          put_secret_if_present BETTER_AUTH_URL
          put_secret_if_present BETTER_AUTH_SECRET
          put_secret_if_present NEXTAUTH_URL
          put_secret_if_present NEXTAUTH_SECRET
          put_secret_if_present GOOGLE_CLIENT_ID
          put_secret_if_present GOOGLE_CLIENT_SECRET
          put_secret_if_present AUTH_MICROSOFT_ENTRA_ID_ID
          put_secret_if_present AUTH_MICROSOFT_ENTRA_ID_SECRET
          put_secret_if_present AUTH_MICROSOFT_ENTRA_ID_TENANT_ID
          put_secret_if_present UPSTASH_REDIS_REST_URL
          put_secret_if_present UPSTASH_REDIS_REST_TOKEN
          put_secret_if_present NEWS_API_BASE_URL
          put_secret_if_present NEXT_PUBLIC_LOG_LEVEL
          put_secret_if_present NEXT_PUBLIC_ADSENSE_CLIENT_ID
          put_secret_if_present NEXT_PUBLIC_ADSENSE_SLOT_SIDEBAR
          put_secret_if_present NEXT_PUBLIC_ADSENSE_SLOT_HEADER
          put_secret_if_present NEXT_PUBLIC_ADSENSE_SLOT_FOOTER
          put_secret_if_present NEXT_PUBLIC_ADSENSE_SLOT_INLINE

      - name: Build vinext output
        run: |
          set -euo pipefail
          set +e
          build_output="$(npm run build:vinext 2>&1)"
          build_code=$?
          set -e

          if [ "$build_code" -ne 0 ]; then
            echo "$build_output"
            build_snippet="$(printf '%s\n' "$build_output" | head -n 25 | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')"
            echo "::error title=Build vinext output failed::$build_snippet"
            exit "$build_code"
          fi

          echo "$build_output"

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
